# ========================
# Application Settings
# ========================
spring.application.name=retro
server.port=${PORT:8080}

# ========================
# Database Configuration (Optimized for 0.1 CPU Free Tier)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}       
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool - Ultra-optimized for 0.1 CPU
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.validation-timeout=3000

# Hibernate / JPA - Aggressive optimization for low CPU
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.default_batch_fetch_size=30
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Query optimization
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.generate_statistics=false


# ========================
# SMTP (Send Emails)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

# ========================
# Actuator (Health Checks)
# ========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ========================
# Timezone
# ========================
spring.jackson.time-zone=Asia/Kolkata

# ========================
# Cache Configuration (Aggressive for 0.1 CPU)
# ========================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=600s,recordStats
spring.cache.cache-names=templates,users,teams,boards,templateColumns

# ========================
# Server Configuration (Optimized for low CPU)
# ========================
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
server.tomcat.accept-count=10
server.tomcat.max-connections=50
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=512

# ========================
# Static Resources
# ========================
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/