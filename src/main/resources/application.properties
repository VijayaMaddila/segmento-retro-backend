# ------------------------------
# Application Settings
# ------------------------------
spring.application.name=retro
server.port=${PORT:8080}

# ------------------------------
# Database Configuration (PostgreSQL on Render)
# ------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}     
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicit Hibernate Dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ------------------------------
# SMTP (Send Mails)
# ------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

# ------------------------------
# Actuator (Health Checks)
# ------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------
# Timezone
# ------------------------------
spring.jackson.time-zone=Asia/Kolkata

# ------------------------------
# Static Resources Configuration
# ------------------------------
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=600000

# ------------------------------
# Slack Integration
# ------------------------------
slack.client-id=${SLACK_CLIENT_ID}
slack.client-secret=${SLACK_CLIENT_SECRET}
slack.redirect-uri=${SLACK_REDIRECT_URI}
slack.scopes=chat:write,incoming-webhook
retro.frontend-url=${FRONTEND_URL}